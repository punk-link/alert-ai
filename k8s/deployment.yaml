apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert-ai-processor
  namespace: monitoring  
  labels:
    app: alert-ai-processor
spec:
  replicas: 1            
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: alert-ai-processor
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: alert-ai-processor
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: app
        image: ghcr.io/punk-link/alertai:1.0.2   # ← подставь свой репо/тег
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 8000
          name: http

        envFrom:
        - secretRef:
            name: alert-ai-secret          # создай секрет с токенами

        env:
        - name: PORT
          value: "8000"
        - name: PYTHONUNBUFFERED
          value: "1"

        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            cpu: 150m
            memory: 768Mi

        livenessProbe:
          httpGet:
            path: /health          # добавь endpoint @app.get("/health") → return {"status":"ok"}
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

---

apiVersion: v1
kind: Service
metadata:
  name: alert-ai-processor
  namespace: monitoring
spec:
  selector:
    app: alert-ai-processor
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
    name: http
  type: ClusterIP